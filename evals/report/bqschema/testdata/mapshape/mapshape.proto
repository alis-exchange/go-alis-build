syntax = "proto3";

package bqschema.test.v1;

option go_package = "go.alis.build/evals/report/bqschema/testdata/mapshape;mapshape";

// WithMap uses legacy proto map fields for bqschema equivalence testing.
message WithMap {
  map<string, int64> counts = 1;
  map<string, string> tags = 2;
}

// WithRepeated uses explicit repeated {key, value} entry messages — the
// current alis.evals.v1 wire shape for tags and errors_by_code.
message WithRepeated {
  message Int64Entry {
    string key = 1;
    int64 value = 2;
  }
  message StringEntry {
    string key = 1;
    string value = 2;
  }
  repeated Int64Entry counts = 1;
  repeated StringEntry tags = 2;
}
